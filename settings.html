<!--
  settings.html — Knowledge Isolation
  This fragment is injected into SillyTavern's Extensions settings drawer.
  ST loads this via $.get() in older versions, or via the manifest's
  settings template path in newer ones. The actual interactive rendering
  (tabs, entry lists, modals) is done by ui.js into #ki-panel-root below;
  this file just provides the mount point and drawer chrome ST expects.
-->
<div id="knowledge_isolation_settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>🔐 Knowledge Isolation</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <div id="ki-panel-root"></div>
    </div>
  </div>
</div>
